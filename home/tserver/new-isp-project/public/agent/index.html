<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f4f7fc;
            --card: white;
            --text: #1e2a3a;
            --border: #cbd5e1;
            --btn: #3b82f6;
            --btn-hover: #2563eb;
            --input-bg: white;
            --table-header: #f2f2f2;
            --whatsapp: #25D366;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --border: #334155;
            --btn: #3b82f6;
            --btn-hover: #60a5fa;
            --input-bg: #334155;
            --table-header: #2d3e4f;
            --whatsapp: #25D366;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s, color 0.3s;
            padding: 20px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .mode-toggle {
            background: var(--btn);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button {
            background: var(--btn);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }
        button.whatsapp { background: #25D366; }
        button.whatsapp:hover { background: #128C7E; }
        .login-form, .dashboard {
            max-width: 1200px;
            margin: auto;
        }
        .login-form {
            max-width: 300px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
        }
        .dashboard {
            display: none;
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: left;
        }
        th { background-color: var(--table-header); }
        .used { background-color: #ffdddd; }
        .unused { background-color: #ddffdd; }
        body.dark .used { background-color: #5a2a2a; }
        body.dark .unused { background-color: #2a5a2a; }
        input, select {
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 4px;
        }
        label {
            display: inline-block;
            width: 120px;
        }
        .form-group { margin-bottom: 15px; }
        .stats-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: var(--btn);
        }
        .search-results {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
        }
        .result-item {
            padding: 5px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }
        .result-item:hover {
            background: var(--btn-hover);
            color: white;
        }
        .customer-details {
            margin-top: 15px;
            padding: 10px;
            background: var(--bg);
            border-radius: 5px;
        }
        hr {
            border-color: var(--border);
        }
        .two-columns {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .column {
            flex: 1;
            min-width: 300px;
        }
        .flex-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div></div>
        <button class="mode-toggle" id="toggleMode">🌙 Dark Mode</button>
    </div>

    <div id="loginDiv" class="login-form">
        <h2>Agent Login</h2>
        <input type="text" id="username" placeholder="Username"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <div id="loginMsg"></div>
    </div>

    <div id="dashboardDiv" class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Welcome, <span id="agentName"></span></h2>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div>Pending Vouchers</div>
                <div class="stat-number" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <div>Sold Vouchers</div>
                <div class="stat-number" id="soldCount">0</div>
            </div>
            <div class="stat-card">
                <div>Total Sales (SAR)</div>
                <div class="stat-number" id="totalSales">0</div>
            </div>
            <div class="stat-card">
                <div>Commission Earned (SAR)</div>
                <div class="stat-number" id="totalCommission">0</div>
            </div>
        </div>

        <div class="two-columns">
            <div class="column">
                <h3>➕ New Customer</h3>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="newName" placeholder="Name">
                </div>
                <div class="form-group">
                    <label>Phone Number:</label>
                    <input type="text" id="newPhone" placeholder="0591234567">
                </div>
                <div class="form-group">
                    <label>Email (optional):</label>
                    <input type="email" id="newEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Address:</label>
                    <input type="text" id="newAddress" placeholder="Room 12, Building 5">
                </div>
                <button onclick="createCustomer()">Create Customer</button>
                <div id="createCustomerMsg"></div>
                <hr>
            </div>
            <div class="column">
                <h3>🔍 Search Customer</h3>
                <div class="form-group">
                    <label>Search (phone/name/MAC):</label>
                    <input type="text" id="searchInput" placeholder="Enter phone, name or MAC">
                    <button onclick="searchCustomer()">Search</button>
                </div>
                <div id="searchResults" class="search-results" style="display:none;"></div>
                <div id="customerDetails" class="customer-details" style="display:none;"></div>
                <hr>
                <h3>⚡ Remote Recharge</h3>
                <div class="form-group">
                    <label>Customer Phone:</label>
                    <input type="text" id="rechargePhone" placeholder="0591234567">
                </div>
                <div class="form-group">
                    <label>Voucher Code:</label>
                    <input type="text" id="rechargePin" placeholder="A3B9C7D2">
                </div>
                <button onclick="remoteRecharge()">Recharge Now</button>
                <div id="rechargeMsg"></div>
            </div>
        </div>

        <h3>📋 Your Vouchers</h3>
        <table id="vouchersTable">
            <thead>
                捕获<th>PIN</th><th>Days</th><th>Price</th><th>Status</th><th>Used By</th><th>Used At</th><th>Commission</th>
                </thead>
            <tbody></tbody>
        </table>

        <h3>📦 Request New Vouchers</h3>
        <div class="form-group">
            <label>Quantity:</label>
            <input type="number" id="qty" placeholder="e.g., 50">
        </div>
        <div class="form-group">
            <label>Valid days:</label>
            <input type="number" id="days" placeholder="e.g., 30">
        </div>
        <button onclick="requestVouchers()">Request</button>
        <div id="reqMsg"></div>
    </div>

    <script>
        let agentId = null;
        let commissionRate = 0;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/agent/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (res.ok) {
                agentId = data.agentId;
                commissionRate = data.commissionRate || 0;
                document.getElementById('agentName').innerText = data.name;
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('dashboardDiv').style.display = 'block';
                loadAllData();
            } else {
                document.getElementById('loginMsg').innerText = data.error;
            }
        }

        async function loadAllData() {
            await loadStats();
            await loadVouchers();
        }

        async function loadStats() {
            const res = await fetch(`/agent/stats?agent_id=${agentId}`);
            const stats = await res.json();
            document.getElementById('pendingCount').innerText = stats.pending;
            document.getElementById('soldCount').innerText = stats.sold;
            document.getElementById('totalSales').innerText = stats.total_sold_value || 0;
            document.getElementById('totalCommission').innerText = stats.total_commission || 0;
        }

        async function loadVouchers() {
            const res = await fetch(`/agent/vouchers?agent_id=${agentId}`);
            let vouchers = await res.json();
            vouchers.sort((a,b) => a.is_used - b.is_used);
            const tbody = document.querySelector('#vouchersTable tbody');
            tbody.innerHTML = '';
            vouchers.forEach(v => {
                const row = tbody.insertRow();
                row.classList.add(v.is_used ? 'used' : 'unused');
                row.insertCell(0).innerText = v.pin_code;
                row.insertCell(1).innerText = v.days_valid;
                row.insertCell(2).innerText = v.price;
                row.insertCell(3).innerText = v.is_used ? 'Used' : 'Unused';
                row.insertCell(4).innerText = v.used_by_phone || '-';
                row.insertCell(5).innerText = v.used_at ? new Date(v.used_at).toLocaleString() : '-';
                row.insertCell(6).innerText = v.commission_earned || 0;
            });
        }

        async function createCustomer() {
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            const email = document.getElementById('newEmail').value;
            const address = document.getElementById('newAddress').value;
            if (!name || !phone) {
                document.getElementById('createCustomerMsg').innerText = 'Name and Phone are required';
                return;
            }
            const res = await fetch('/agent/create-customer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({agent_id: agentId, phone, name, email, address})
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('createCustomerMsg').innerText = 'Customer created successfully';
                document.getElementById('newName').value = '';
                document.getElementById('newPhone').value = '';
                document.getElementById('newEmail').value = '';
                document.getElementById('newAddress').value = '';
            } else {
                document.getElementById('createCustomerMsg').innerText = data.error;
            }
        }

        // Format phone number for WhatsApp
        function formatPhoneForWhatsApp(phone) {
            let p = phone.trim();
            if (p.startsWith('0')) p = p.substring(1);
            if (!p.startsWith('966')) p = '966' + p;
            return p;
        }

        function getWhatsAppUrl(customer) {
            const phone = formatPhoneForWhatsApp(customer.phone);
            const expiry = customer.expiry_date ? new Date(customer.expiry_date).toLocaleDateString() : 'soon';
            const balance = customer.balance ? customer.balance : 0;
            const message = `Hello ${customer.name}, your internet service will expire on ${expiry}. Your current balance is ${balance} SAR. Please recharge to continue. Thank you.`;
            return `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        }

        function openWhatsApp(customer) {
            window.open(getWhatsAppUrl(customer), '_blank');
        }

        async function searchCustomer() {
            const q = document.getElementById('searchInput').value;
            if (!q) return;
            const res = await fetch(`/agent/search-customer?q=${encodeURIComponent(q)}&agent_id=${agentId}`);
            const customers = await res.json();
            const resultsDiv = document.getElementById('searchResults');
            if (customers.length === 0) {
                resultsDiv.innerHTML = 'No customers found';
                resultsDiv.style.display = 'block';
                return;
            }
            resultsDiv.innerHTML = '<strong>Select a customer to view details:</strong><br>';
            customers.forEach(c => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerText = `${c.name} (${c.phone}) - Expiry: ${new Date(c.expiry_date).toLocaleDateString()}`;
                div.onclick = () => showCustomerDetails(c);
                resultsDiv.appendChild(div);
            });
            resultsDiv.style.display = 'block';
        }

        function showCustomerDetails(customer) {
            const detailsDiv = document.getElementById('customerDetails');
            detailsDiv.innerHTML = `
                <strong>Customer Details</strong><br>
                Name: ${customer.name}<br>
                Phone: ${customer.phone}<br>
                Address: ${customer.address || '-'}<br>
                Expiry Date: ${new Date(customer.expiry_date).toLocaleString()}<br>
                Status: ${customer.status}<br>
                Balance: ${customer.balance || 0} SAR<br>
                Devices: ${customer.devices || '-'}<br>
                <div class="flex-buttons">
                    <button onclick="prefillRecharge('${customer.phone}')">Recharge this customer</button>
                    <button class="whatsapp" onclick="openWhatsApp(${JSON.stringify(customer)})">WhatsApp</button>
                </div>
            `;
            detailsDiv.style.display = 'block';
        }

        function prefillRecharge(phone) {
            document.getElementById('rechargePhone').value = phone;
            document.getElementById('rechargePin').focus();
        }

        async function remoteRecharge() {
            const phone = document.getElementById('rechargePhone').value;
            const pin = document.getElementById('rechargePin').value;
            if (!phone || !pin) {
                document.getElementById('rechargeMsg').innerText = 'Please enter phone and voucher code';
                return;
            }
            const res = await fetch('/agent/remote-recharge', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({agent_id: agentId, phone, pin_code: pin})
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('rechargeMsg').innerText = `Success! New expiry: ${new Date(data.new_expiry).toLocaleString()}`;
                loadAllData();
                const searchInput = document.getElementById('searchInput').value;
                if (searchInput) searchCustomer();
            } else {
                document.getElementById('rechargeMsg').innerText = data.error;
            }
        }

        async function requestVouchers() {
            const quantity = document.getElementById('qty').value;
            const days = document.getElementById('days').value;
            if (!quantity || !days) {
                document.getElementById('reqMsg').innerText = 'Please enter quantity and days';
                return;
            }
            const res = await fetch('/agent/request-vouchers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({agent_id: agentId, quantity, days_valid: days})
            });
            const data = await res.json();
            document.getElementById('reqMsg').innerText = data.message;
        }

        function logout() {
            agentId = null;
            document.getElementById('loginDiv').style.display = 'block';
            document.getElementById('dashboardDiv').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        const toggleBtn = document.getElementById('toggleMode');
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            toggleBtn.textContent = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
        });
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark');
            toggleBtn.textContent = '☀️ Light Mode';
        }
    </script>
</body>
</html>
